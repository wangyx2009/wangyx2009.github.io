<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苏州外国语学校高中部辩论赛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        :root {
            --pro-color: #dc2626;
            --pro-light: #fecaca;
            --con-color: #2563eb;
            --con-light: #bfdbfe;
            --warning-color: #fbbf24;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-white: #f8fafc;
            --text-gray: #94a3b8;
            --border-radius: 8px;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            padding: 20px;
            user-select: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 头部标题 */
        header {
            text-align: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .current-round-info {
            font-size: 1.5rem;
            font-weight: 600;
            min-height: 2rem;
        }

        .pro-text {
            color: var(--pro-color);
        }

        .con-text {
            color: var(--con-color);
        }

        /* 主计时区域 */
        .timer-section {
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .normal-timer {
            width: 100%;
            text-align: center;
        }

        .time-display {
            font-size: 12rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 16px;
            transition: all 0.2s ease;
        }

        .time-display.pro {
            color: var(--pro-color);
        }

        .time-display.con {
            color: var(--con-color);
        }

        .time-display.warning {
            color: var(--warning-color);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* 自由辩论计时器 */
        .free-timer-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            width: 100%;
        }

        .free-timer-card {
            background-color: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 32px;
            text-align: center;
            border: 4px solid transparent;
            transition: all 0.3s ease;
        }

        .free-timer-card.pro {
            border-color: var(--pro-color);
        }

        .free-timer-card.con {
            border-color: var(--con-color);
        }

        .free-timer-card.active {
            transform: scale(1.02);
            box-shadow: 0 0 30px currentColor;
        }

        .free-timer-card.pro.active {
            box-shadow: 0 0 30px var(--pro-color);
        }

        .free-timer-card.con.active {
            box-shadow: 0 0 30px var(--con-color);
        }

        .team-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .free-time-display {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 16px;
        }

        .free-time-display.pro {
            color: var(--pro-color);
        }

        .free-time-display.con {
            color: var(--con-color);
        }

        .free-time-display.warning {
            color: var(--warning-color);
            animation: blink 1s infinite;
        }

        .time-label {
            font-size: 1.2rem;
            color: var(--text-gray);
        }

        /* 控制按钮区域 */
        .control-section {
            margin-bottom: 32px;
            width: 100%;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .btn {
            padding: 16px 32px;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-prev, .btn-next {
            background-color: #475569;
        }

        .btn-start {
            background-color: #16a34a;
            min-width: 120px;
        }

        .btn-pause {
            background-color: #ca8a04;
            min-width: 120px;
        }

        .btn-reset {
            background-color: #7c3aed;
        }

        .btn-pro {
            background-color: var(--pro-color);
        }

        .btn-con {
            background-color: var(--con-color);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .shortcut-tips {
            text-align: center;
            color: var(--text-gray);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* 环节列表区域 */
        .rounds-section {
            margin-bottom: 24px;
            overflow-x: auto;
        }

        .rounds-table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--bg-card);
            border-radius: var(--border-radius);
            overflow: hidden;
        }

        .rounds-table th, .rounds-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }

        .rounds-table th {
            background-color: #334155;
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .rounds-table tr {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .rounds-table tr:hover {
            background-color: #334155;
        }

        .rounds-table tr.current {
            background-color: #334155;
            border-left: 4px solid;
        }

        .rounds-table tr.current.pro {
            border-left-color: var(--pro-color);
        }

        .rounds-table tr.current.con {
            border-left-color: var(--con-color);
        }

        .rounds-table tr.current.both {
            border-left-color: var(--warning-color);
        }

        .rounds-table tr.completed {
            opacity: 0.6;
        }

        .round-status {
            text-align: center;
            font-weight: 700;
        }

        .completed-mark {
            color: #10b981;
        }

        /* 规则提示区域 */
        .rule-section {
            background-color: var(--bg-card);
            padding: 16px 20px;
            border-radius: var(--border-radius);
            margin-bottom: 16px;
        }

        .rule-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--warning-color);
        }

        .rule-content {
            color: var(--text-gray);
            line-height: 1.5;
        }

        footer {
            text-align: center;
            color: var(--text-gray);
            font-size: 0.85rem;
            margin-top: 32px;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            .current-round-info {
                font-size: 1.1rem;
            }
            .time-display {
                font-size: 6rem;
            }
            .free-timer-container {
                grid-template-columns: 1fr;
            }
            .free-time-display {
                font-size: 5rem;
            }
            .btn {
                padding: 12px 20px;
                font-size: 1rem;
            }
            .rounds-table th, .rounds-table td {
                padding: 8px 10px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>苏州外国语学校高中部辩论赛</h1>
            <div class="current-round-info" id="currentRoundInfo"></div>
        </header>

        <!-- 计时主区域 -->
        <section class="timer-section">
            <!-- 普通环节计时器 -->
            <div class="normal-timer" id="normalTimer">
                <div class="time-display" id="timeDisplay">00:00</div>
            </div>

            <!-- 自由辩论计时器 -->
            <div class="free-timer-container" id="freeTimer" style="display: none;">
                <div class="free-timer-card pro" id="proFreeCard">
                    <div class="team-name pro-text">正方</div>
                    <div class="free-time-display pro" id="proTimeDisplay">04:00</div>
                    <div class="time-label">剩余时间</div>
                </div>
                <div class="free-timer-card con" id="conFreeCard">
                    <div class="team-name con-text">反方</div>
                    <div class="free-time-display con" id="conTimeDisplay">04:00</div>
                    <div class="time-label">剩余时间</div>
                </div>
            </div>
        </section>

        <!-- 控制按钮区域 -->
        <section class="control-section">
            <div class="control-buttons" id="controlButtons">
                <button class="btn btn-prev" id="prevBtn">上一环节</button>
                <button class="btn btn-start" id="startBtn">开始</button>
                <button class="btn btn-reset" id="resetBtn">重置</button>
                <button class="btn btn-next" id="nextBtn">下一环节</button>
            </div>
            <div class="shortcut-tips" id="shortcutTips">
                快捷键：空格【开始/暂停】 | ← 上一环节 | → 下一环节 | R 重置当前环节<br>
                自由辩论专属：A 切换正方发言 | L 切换反方发言
            </div>
        </section>

        <!-- 规则提示区域 -->
        <section class="rule-section">
            <div class="rule-title">环节规则</div>
            <div class="rule-content" id="ruleContent"></div>
        </section>

        <!-- 环节列表区域 -->
        <section class="rounds-section">
            <table class="rounds-table">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>环节名称</th>
                        <th>参与人员</th>
                        <th>时长</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="roundsTableBody"></tbody>
            </table>
        </section>

        <footer>
            苏州外国语学校高中部辩论赛
        </footer>
    </div>

    <script>
        // 环节数据 严格匹配用户提供的流程
        const rounds = [
            { id: 1, name: '开篇立论', person: '正方一辩', duration: 150, rule: '', team: '正方', type: 'normal' },
            { id: 2, name: '质询', person: '反方四辩对正方一辩', duration: 90, rule: '质询方可打断回答方，回答方发言不计时', team: '反方', type: 'normal' },
            { id: 3, name: '开篇立论', person: '反方一辩', duration: 150, rule: '', team: '反方', type: 'normal' },
            { id: 4, name: '质询', person: '正方四辩对反方一辩', duration: 90, rule: '质询方可打断回答方，回答方发言不计时', team: '正方', type: 'normal' },
            { id: 5, name: '二辩立论', person: '正方二辩', duration: 120, rule: '', team: '正方', type: 'normal' },
            { id: 6, name: '质询', person: '反方三辩对正方二辩', duration: 90, rule: '质询方可打断回答方，回答方发言不计时', team: '反方', type: 'normal' },
            { id: 7, name: '二辩立论', person: '反方二辩', duration: 120, rule: '', team: '反方', type: 'normal' },
            { id: 8, name: '质询', person: '正方三辩对反方二辩', duration: 90, rule: '质询方可打断回答方，回答方发言不计时', team: '正方', type: 'normal' },
            { id: 9, name: '质询小结', person: '反方三辩', duration: 150, rule: '', team: '反方', type: 'normal' },
            { id: 10, name: '质询小结', person: '正方三辩', duration: 150, rule: '', team: '正方', type: 'normal' },
            { id: 11, name: '自由辩论', person: '双方任意辩手', duration: 480, rule: '双方各240秒，正方先开始；一方发言结束后另一方立即计时；时间用尽后另一方可多位辩手轮流发言', team: 'both', type: 'free' },
            { id: 12, name: '总结陈词', person: '反方四辩', duration: 180, rule: '', team: '反方', type: 'normal' },
            { id: 13, name: '总结陈词', person: '正方四辩', duration: 180, rule: '', team: '正方', type: 'normal' },
        ];

        // 全局状态
        let currentRoundIndex = 0;
        let timer = null;
        let isRunning = false;
        let remainingTime = rounds[0].duration;
        let hasWarned15s = false;
        let completedRounds = new Set();

        // 自由辩论专属状态
        const freeDebate = {
            proRemaining: 240,
            conRemaining: 240,
            currentTeam: 'pro',
            isRunning: false,
            hasProWarned: false,
            hasConWarned: false
        };

        // DOM元素
        const currentRoundInfo = document.getElementById('currentRoundInfo');
        const timeDisplay = document.getElementById('timeDisplay');
        const normalTimer = document.getElementById('normalTimer');
        const freeTimer = document.getElementById('freeTimer');
        const proTimeDisplay = document.getElementById('proTimeDisplay');
        const conTimeDisplay = document.getElementById('conTimeDisplay');
        const proFreeCard = document.getElementById('proFreeCard');
        const conFreeCard = document.getElementById('conFreeCard');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const controlButtons = document.getElementById('controlButtons');
        const ruleContent = document.getElementById('ruleContent');
        const roundsTableBody = document.getElementById('roundsTableBody');
        const shortcutTips = document.getElementById('shortcutTips');

        // 时间格式化
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // 提示音
        function playBeep(frequency = 800, duration = 200) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + duration / 1000);
            } catch (e) {
                console.log('音频播放不支持', e);
            }
        }

        // 渲染环节列表
        function renderRoundsTable() {
            roundsTableBody.innerHTML = '';
            rounds.forEach((round, index) => {
                const tr = document.createElement('tr');
                const isCurrent = index === currentRoundIndex;
                const isCompleted = completedRounds.has(index);
                const teamClass = round.team === '正方' ? 'pro' : round.team === '反方' ? 'con' : 'both';

                tr.className = `${isCurrent ? 'current ' + teamClass : ''} ${isCompleted ? 'completed' : ''}`;
                tr.onclick = () => goToRound(index);

                tr.innerHTML = `
                    <td>${round.id}</td>
                    <td>${round.name}</td>
                    <td>${round.person}</td>
                    <td>${formatTime(round.duration)}</td>
                    <td class="round-status">${isCompleted ? '<span class="completed-mark">✓ 已完成</span>' : isCurrent ? '<span style="color:var(--warning-color)">进行中</span>' : '未开始'}</td>
                `;
                roundsTableBody.appendChild(tr);
            });
        }

        // 更新UI
        function updateUI() {
            const currentRound = rounds[currentRoundIndex];
            
            // 更新当前环节信息
            const teamColorClass = currentRound.team === '正方' ? 'pro-text' : currentRound.team === '反方' ? 'con-text' : '';
            currentRoundInfo.innerHTML = `第${currentRound.id}环节：${currentRound.name} | <span class="${teamColorClass}">${currentRound.person}</span>`;
            
            // 更新规则
            ruleContent.textContent = currentRound.rule || '无特殊规则，发言时间结束自动停止计时';

            // 切换计时器类型
            if (currentRound.type === 'free') {
                normalTimer.style.display = 'none';
                freeTimer.style.display = 'grid';
                updateFreeTimerUI();
            } else {
                normalTimer.style.display = 'block';
                freeTimer.style.display = 'none';
                updateNormalTimerUI();
            }

            // 更新按钮状态
            prevBtn.disabled = currentRoundIndex === 0;
            nextBtn.disabled = currentRoundIndex === rounds.length - 1;

            // 渲染环节列表
            renderRoundsTable();
        }

        // 更新普通计时器UI
        function updateNormalTimerUI() {
            const currentRound = rounds[currentRoundIndex];
            timeDisplay.textContent = formatTime(remainingTime);
            
            // 重置颜色
            timeDisplay.className = 'time-display';
            if (currentRound.team === '正方') timeDisplay.classList.add('pro');
            if (currentRound.team === '反方') timeDisplay.classList.add('con');
            
            // 15秒警告
            if (remainingTime <= 15) {
                timeDisplay.classList.add('warning');
                if (!hasWarned15s && remainingTime === 15) {
                    playBeep(600, 300);
                    hasWarned15s = true;
                }
            }

            // 更新按钮文本
            startBtn.textContent = isRunning ? '暂停' : '开始';
            startBtn.className = isRunning ? 'btn btn-pause' : 'btn btn-start';
        }

        // 更新自由辩论计时器UI
        function updateFreeTimerUI() {
            proTimeDisplay.textContent = formatTime(freeDebate.proRemaining);
            conTimeDisplay.textContent = formatTime(freeDebate.conRemaining);

            // 重置样式
            proTimeDisplay.className = 'free-time-display pro';
            conTimeDisplay.className = 'free-time-display con';
            proFreeCard.classList.remove('active');
            conFreeCard.classList.remove('active');

            // 当前发言方高亮
            if (freeDebate.currentTeam === 'pro') {
                proFreeCard.classList.add('active');
            } else {
                conFreeCard.classList.add('active');
            }

            // 15秒警告
            if (freeDebate.proRemaining <= 15) {
                proTimeDisplay.classList.add('warning');
                if (!freeDebate.hasProWarned && freeDebate.proRemaining === 15) {
                    playBeep(600, 300);
                    freeDebate.hasProWarned = true;
                }
            }
            if (freeDebate.conRemaining <= 15) {
                conTimeDisplay.classList.add('warning');
                if (!freeDebate.hasConWarned && freeDebate.conRemaining === 15) {
                    playBeep(600, 300);
                    freeDebate.hasConWarned = true;
                }
            }

            // 更新按钮文本
            startBtn.textContent = freeDebate.isRunning ? '暂停' : '开始';
            startBtn.className = freeDebate.isRunning ? 'btn btn-pause' : 'btn btn-start';
        }

        // 普通计时器启动
        function startNormalTimer() {
            if (remainingTime <= 0) return;

            isRunning = true;
            timer = setInterval(() => {
                remainingTime--;
                updateNormalTimerUI();

                if (remainingTime <= 0) {
                    clearInterval(timer);
                    isRunning = false;
                    playBeep(1000, 500);
                    completedRounds.add(currentRoundIndex);
                    updateUI();
                }
            }, 1000);
            updateNormalTimerUI();
        }

        // 普通计时器暂停
        function pauseNormalTimer() {
            clearInterval(timer);
            isRunning = false;
            updateNormalTimerUI();
        }

        // 自由辩论计时器启动
        function startFreeTimer() {
            const currentTeam = freeDebate.currentTeam;
            if ((currentTeam === 'pro' && freeDebate.proRemaining <= 0) || 
                (currentTeam === 'con' && freeDebate.conRemaining <= 0)) {
                return;
            }

            freeDebate.isRunning = true;
            timer = setInterval(() => {
                if (freeDebate.currentTeam === 'pro') {
                    freeDebate.proRemaining--;
                } else {
                    freeDebate.conRemaining--;
                }
                updateFreeTimerUI();

                // 时间到处理
                if ((freeDebate.currentTeam === 'pro' && freeDebate.proRemaining <= 0) ||
                    (freeDebate.currentTeam === 'con' && freeDebate.conRemaining <= 0)) {
                    clearInterval(timer);
                    freeDebate.isRunning = false;
                    playBeep(1000, 500);
                    
                    // 双方都结束标记完成
                    if (freeDebate.proRemaining <= 0 && freeDebate.conRemaining <= 0) {
                        completedRounds.add(currentRoundIndex);
                        updateUI();
                    }
                }
            }, 1000);
            updateFreeTimerUI();
        }

        // 自由辩论计时器暂停
        function pauseFreeTimer() {
            clearInterval(timer);
            freeDebate.isRunning = false;
            updateFreeTimerUI();
        }

        // 自由辩论切换发言方
        function switchFreeTeam(team) {
            if ((team === 'pro' && freeDebate.proRemaining <= 0) ||
                (team === 'con' && freeDebate.conRemaining <= 0)) {
                return;
            }

            const wasRunning = freeDebate.isRunning;
            pauseFreeTimer();
            freeDebate.currentTeam = team;
            if (wasRunning) {
                startFreeTimer();
            }
            updateFreeTimerUI();
        }

        // 重置当前环节
        function resetCurrentRound() {
            clearInterval(timer);
            const currentRound = rounds[currentRoundIndex];
            
            if (currentRound.type === 'free') {
                freeDebate.proRemaining = 240;
                freeDebate.conRemaining = 240;
                freeDebate.currentTeam = 'pro';
                freeDebate.isRunning = false;
                freeDebate.hasProWarned = false;
                freeDebate.hasConWarned = false;
            } else {
                remainingTime = currentRound.duration;
                isRunning = false;
                hasWarned15s = false;
            }
            completedRounds.delete(currentRoundIndex);
            updateUI();
        }

        // 切换环节
        function goToRound(index) {
            if (index < 0 || index >= rounds.length) return;
            
            clearInterval(timer);
            currentRoundIndex = index;
            const currentRound = rounds[currentRoundIndex];
            
            // 重置状态
            if (currentRound.type === 'free') {
                freeDebate.proRemaining = 240;
                freeDebate.conRemaining = 240;
                freeDebate.currentTeam = 'pro';
                freeDebate.isRunning = false;
                freeDebate.hasProWarned = false;
                freeDebate.hasConWarned = false;
            } else {
                remainingTime = currentRound.duration;
                isRunning = false;
                hasWarned15s = false;
            }
            updateUI();
        }

        // 上一环节
        function prevRound() {
            goToRound(currentRoundIndex - 1);
        }

        // 下一环节
        function nextRound() {
            goToRound(currentRoundIndex + 1);
        }

        // 事件监听
        startBtn.addEventListener('click', () => {
            const currentRound = rounds[currentRoundIndex];
            if (currentRound.type === 'free') {
                if (freeDebate.isRunning) {
                    pauseFreeTimer();
                } else {
                    startFreeTimer();
                }
            } else {
                if (isRunning) {
                    pauseNormalTimer();
                } else {
                    startNormalTimer();
                }
            }
        });

        resetBtn.addEventListener('click', resetCurrentRound);
        prevBtn.addEventListener('click', prevRound);
        nextBtn.addEventListener('click', nextRound);

        // 快捷键监听
        document.addEventListener('keydown', (e) => {
            // 防止输入框触发
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            
            const key = e.key.toUpperCase();
            const currentRound = rounds[currentRoundIndex];

            switch (key) {
                case ' ': // 空格
                    e.preventDefault();
                    if (currentRound.type === 'free') {
                        if (freeDebate.isRunning) {
                            pauseFreeTimer();
                        } else {
                            startFreeTimer();
                        }
                    } else {
                        if (isRunning) {
                            pauseNormalTimer();
                        } else {
                            startNormalTimer();
                        }
                    }
                    break;
                case 'ARROWLEFT': // 左箭头
                    e.preventDefault();
                    prevRound();
                    break;
                case 'ARROWRIGHT': // 右箭头
                    e.preventDefault();
                    nextRound();
                    break;
                case 'R': // R重置
                    e.preventDefault();
                    resetCurrentRound();
                    break;
                case 'A': // 自由辩论正方
                    if (currentRound.type === 'free') {
                        e.preventDefault();
                        switchFreeTeam('pro');
                    }
                    break;
                case 'L': // 自由辩论反方
                    if (currentRound.type === 'free') {
                        e.preventDefault();
                        switchFreeTeam('con');
                    }
                    break;
            }
        });

        // 初始化
        updateUI();
    </script>
</body>
</html>
